spring:
  application:
    name: rider-service

  #Database
  datasource:
    url: jdbc:postgresql://localhost:5432/rider-service
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver: class-name=org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

jwt:
secret: ${JWT_SECRET}